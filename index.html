<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Face QEM + Smile</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Control panel -->
    <div id="panel">
      <h2>FPS benchmark</h2>

      <label>
        Model
        <select id="model-select">
          <option value="flame_base.obj">flame_base.obj</option>
          <option value="bunny30k.obj" selected>bunny30k.obj</option>
          <option value="ksHeadNormal.obj">ksHeadNormal.obj</option>
        </select>
      </label>

      <hr />

      <label>
        Simplification ratio
        <span id="ratio-display" class="value">100%</span>
      </label>
      <input
        id="ratio-slider"
        type="range"
        min="1"
        max="100"
        value="100"
        step="1"
      />
      <p class="hint">100% = full resolution. 10% = keep 10% of faces.</p>

      <button id="apply-btn">Apply</button>

      <div id="progress-track">
        <div id="progress-bar"></div>
      </div>

      <hr />

      <label>
        Smile
        <span id="morph-display" class="value">0%</span>
      </label>
      <input
        id="morph-slider"
        type="range"
        min="0"
        max="100"
        value="0"
        step="1"
      />
      <p class="hint">Drag to blend between neutral and smile.</p>

      <hr />
      <button
        id="switch-btn"
        onclick="window.location.href = 'comparison.html'"
      >
        Switch to Comparison Test
      </button>
    </div>
    <p id="status">Loading…</p>
    <canvas id="bg"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
